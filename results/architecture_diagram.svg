<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; }
      .subtitle { font-size: 14px; font-weight: bold; }
      .label { font-size: 11px; }
      .box { stroke: #333; stroke-width: 2; fill: #e8f4f8; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle">U-Net Architecture Overview</text>
  <text x="600" y="55" class="subtitle" text-anchor="middle">Encoder-Decoder with Skip Connections | 28.5M Parameters</text>
  
  <!-- Encoder Path -->
  <text x="100" y="90" class="subtitle">ENCODER (Downsampling)</text>
  
  <!-- Input -->
  <rect x="30" y="110" width="140" height="60" class="box"/>
  <text x="100" y="135" text-anchor="middle" class="label">Input</text>
  <text x="100" y="150" text-anchor="middle" class="label">3×512×512</text>
  
  <!-- Conv1 -->
  <line x1="170" y1="140" x2="230" y2="140" class="arrow"/>
  <rect x="230" y="110" width="140" height="60" class="box"/>
  <text x="300" y="135" text-anchor="middle" class="label">Conv Block 1</text>
  <text x="300" y="150" text-anchor="middle" class="label">64×512×512</text>
  
  <!-- MaxPool1 -->
  <line x1="370" y1="140" x2="430" y2="140" class="arrow"/>
  <rect x="430" y="110" width="100" height="60" class="box" fill="#ffe8e8"/>
  <text x="480" y="140" text-anchor="middle" class="label">MaxPool</text>
  
  <!-- Conv2 -->
  <line x1="530" y1="140" x2="590" y2="200" class="arrow"/>
  <rect x="590" y="170" width="140" height="60" class="box"/>
  <text x="660" y="195" text-anchor="middle" class="label">Conv Block 2</text>
  <text x="660" y="210" text-anchor="middle" class="label">128×256×256</text>
  
  <!-- MaxPool2 -->
  <line x1="730" y1="200" x2="790" y2="200" class="arrow"/>
  <rect x="790" y="170" width="100" height="60" class="box" fill="#ffe8e8"/>
  <text x="840" y="200" text-anchor="middle" class="label">MaxPool</text>
  
  <!-- Conv3 -->
  <line x1="890" y1="200" x2="950" y2="260" class="arrow"/>
  <rect x="950" y="230" width="140" height="60" class="box"/>
  <text x="1020" y="255" text-anchor="middle" class="label">Conv Block 3</text>
  <text x="1020" y="270" text-anchor="middle" class="label">256×128×128</text>
  
  <!-- Bottleneck -->
  <text x="100" y="340" class="subtitle">BOTTLENECK</text>
  <rect x="30" y="360" width="200" height="80" class="box" fill="#fff4e6"/>
  <text x="130" y="390" text-anchor="middle" class="label">Conv Block (1024 ch)</text>
  <text x="130" y="410" text-anchor="middle" class="label">64×64 resolution</text>
  <text x="130" y="425" text-anchor="middle" class="label">Deepest layer</text>
  
  <!-- Decoder Path -->
  <text x="400" y="340" class="subtitle">DECODER (Upsampling)</text>
  
  <!-- UpConv3 -->
  <line x1="240" y1="400" x2="400" y2="290" class="arrow"/>
  <rect x="400" y="230" width="140" height="60" class="box" fill="#e8ffe8"/>
  <text x="470" y="255" text-anchor="middle" class="label">UpConv Block 3</text>
  <text x="470" y="270" text-anchor="middle" class="label">256×128×128</text>
  
  <!-- Skip connection annotation -->
  <text x="480" y="155" class="label" fill="#ff0000">Skip from Encoder</text>
  <line x1="1020" y1="170" x2="540" y2="170" stroke="#ff6666" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- UpConv2 -->
  <line x1="540" y1="230" x2="620" y2="170" class="arrow"/>
  <rect x="620" y="110" width="140" height="60" class="box" fill="#e8ffe8"/>
  <text x="690" y="135" text-anchor="middle" class="label">UpConv Block 2</text>
  <text x="690" y="150" text-anchor="middle" class="label">128×256×256</text>
  
  <!-- UpConv1 -->
  <line x1="760" y1="140" x2="840" y2="140" class="arrow"/>
  <rect x="840" y="110" width="140" height="60" class="box" fill="#e8ffe8"/>
  <text x="910" y="135" text-anchor="middle" class="label">UpConv Block 1</text>
  <text x="910" y="150" text-anchor="middle" class="label">64×512×512</text>
  
  <!-- Output -->
  <line x1="980" y1="140" x2="1040" y2="140" class="arrow"/>
  <rect x="1040" y="110" width="140" height="60" class="box" fill="#fff0f0"/>
  <text x="1110" y="135" text-anchor="middle" class="label">Output Conv</text>
  <text x="1110" y="150" text-anchor="middle" class="label">21×512×512</text>
  
  <!-- Key Features -->
  <rect x="30" y="500" width="1140" height="350" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="60" y="530" class="subtitle">Architecture Features</text>
  
  <text x="60" y="560" class="label">✓ Encoder-Decoder Structure: Symmetric design for pixel-level predictions</text>
  <text x="60" y="585" class="label">✓ Skip Connections: Concatenate encoder features with decoder features to preserve spatial information</text>
  <text x="60" y="610" class="label">✓ 4 Downsampling Levels: Progressively reduces spatial resolution (512→256→128→64)</text>
  <text x="60" y="635" class="label">✓ Batch Normalization: Applied after each convolution for training stability</text>
  <text x="60" y="660" class="label">✓ ReLU Activations: Non-linearity in all hidden layers (except output softmax)</text>
  <text x="60" y="685" class="label">✓ Total Parameters: 28.5M (manageable on M2 GPU with batch size 4)</text>
  <text x="60" y="710" class="label">✓ Output: 21-class probability map (one score per class for each pixel)</text>
  
  <text x="60" y="745" class="subtitle">Training Details</text>
  <text x="60" y="770" class="label">Loss Function: 0.5 × CrossEntropyLoss + 0.5 × DiceLoss (Combined approach)</text>
  <text x="60" y="795" class="label">Optimizer: Adam (lr=1e-3) | Scheduler: Cosine Annealing | Batch Size: 4 | Epochs: 50</text>
  <text x="60" y="820" class="label">Device: Apple M2 GPU (Metal Performance Shaders) | Training Time: 3 days 18 hours</text>
</svg>
